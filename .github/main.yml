name: Build and deploy

on:
  push:
    branches:
      - main
      - develop

env:
  ECR_REPOSITORY: cicd-tests

jobs:
  tagging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Next Release Number
        run: echo ${{ steps.branchTag.outputs.releaseType }}

      - name: conditional output
        id: versioningTag
        run: |
          if [ ${{ github.ref }} == refs/heads/develop ]; then
             echo "releaseType=patch" >> $GITHUB_OUTPUT
          else
             echo "releaseType=minor" >> $GITHUB_OUTPUT
          fi

      - name: Auto Increment Semver Action
        uses: MCKanpolat/auto-semver-action@1.0.5
        id: versioning
        with:
          releaseType: ${{ steps.versioningTag.outputs.releaseType }}
          incrementPerCommit: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: conditional output
        id: branchTag
        run: |
          if [ ${{ github.ref }} == refs/heads/develop ]; then
             echo "currentTag=${{ steps.versioning.outputs.version }}" >> $GITHUB_OUTPUT
             echo "currentStack=dev" >> $GITHUB_OUTPUT
             echo "releaseType=patch" >> $GITHUB_OUTPUT
             echo "clusterName=seamless" >> $GITHUB_OUTPUT
             echo "Dev branch"
          else
             echo "currentTag=${{ steps.versioning.outputs.version }}" >> $GITHUB_OUTPUT
             echo "currentStack=prod" >> $GITHUB_OUTPUT
             echo "releaseType=minor" >> $GITHUB_OUTPUT
             echo "clusterName=mock-service-prod" >> $GITHUB_OUTPUT
             echo "Prod branch"
          fi

      - name: Next Release Number
        run: echo ${{ steps.versioning.outputs.version }}

      - name: Tag release
        shell: bash
        run: |
          git tag ${{ steps.versioning.outputs.version }}
          git push origin ${{ steps.versioning.outputs.version }}

      - name: Echo
        run: |
          echo ${{ steps.versioning.outputs.version }}
          echo ${{ steps.branchTag.outputs.currentTag }}
          echo ${{ steps.branchTag.outputs.currentStack }}
          echo ${{ steps.versioningTag.outputs.releaseType }}

    outputs:
      tag: ${{ steps.branchTag.outputs.currentTag }}
      stack: ${{ steps.branchTag.outputs.currentStack }}

  publish-image:
    runs-on: ubuntu-latest
    needs: tagging

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set environment for develop branch
        shell: bash
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "ASPNETCORE_ENVIRONMENT=Development" >> $GITHUB_ENV

      - name: Set environment for main branch
        shell: bash
        if: github.ref == 'refs/heads/main'
        run: |
          echo "ASPNETCORE_ENVIRONMENT=Production" >> $GITHUB_ENV

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.tagging.outputs.tag }}
          build-args: |         
            BUILDPLATFORM=${{ matrix.platform }}
            ASPNETCORE_ENVIRONMENT=${{ env.ASPNETCORE_ENVIRONMENT }}
            BUILDKIT_PROGRESS=plain